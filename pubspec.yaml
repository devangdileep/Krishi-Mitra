name: krishi_mitra
description: Offline-first AI farming platform migrated from the Kotlin Android app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  crypto: ^3.0.3
  maplibre_gl: ^0.26.0
  flutter_tts: ^3.8.5
  geolocator: ^11.0.0
  go_router: ^14.2.7
  http: ^1.2.1
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  speech_to_text: ^7.3.0
  uuid: ^4.4.0
