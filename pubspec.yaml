  path_provider: ^2.1.5
  flutter_riverpod: ^3.3.1
  supabase_flutter: ^2.12.4
  dio: ^5.9.2
  flutter_animate: ^4.5.2
  flutter_dotenv: ^6.0.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
