pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localProperties = file("local.properties")
        if (localProperties.exists()) {
            localProperties.withInputStream { properties.load(it) }
        }
        def sdkPath = properties.getProperty("flutter.sdk")
        if (sdkPath == null || sdkPath.trim().isEmpty()) {
            sdkPath = System.getenv("FLUTTER_ROOT") ?: System.getenv("FLUTTER_HOME")
        }
        if (sdkPath == null || sdkPath.trim().isEmpty()) {
            sdkPath = ["E:/flutter", "C:/src/flutter", "C:/flutter"].find { file(it).exists() }
        }
        if (sdkPath == null || sdkPath.trim().isEmpty()) {
            throw new GradleException("Flutter SDK not found. Add flutter.sdk=E\\:\\\\flutter to android/local.properties or set FLUTTER_ROOT.")
        }
        return sdkPath.replace("\\", "/")
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version '9.2.1' apply false
    id "org.jetbrains.kotlin.android" version "2.2.20" apply false
}

include ":app"
